name: Release Helm Chart

on:
  push:
    branches: [master]
    paths: ['observe-chart/**']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: azure/setup-helm@v4

    - name: Package and release chart
      run: |
        helm package observe-chart/ --destination /tmp
        git checkout gh-pages
        cp /tmp/observe-0.1.0.tgz .
        rm -rf observe-chart/
        helm repo index . --url https://mahammadali12.github.io/observe
        git config user.name github-actions
        git config user.email github-actions@github.com
        git add observe-0.1.0.tgz index.yaml
        git commit -m 'chore: auto-release chart [skip ci]'
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
