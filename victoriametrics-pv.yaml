apiVersion: v1
kind: PersistentVolume
metadata:
  name: victoria-metrics-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /var/lib/observability/victoria-metrics
    type: DirectoryOrCreate
