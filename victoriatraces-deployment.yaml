apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria-traces
  namespace: default
  labels:
    app: victoria-traces
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoria-traces
  template:
    metadata:
      labels:
        app: victoria-traces
    spec:
      containers:
      - name: victoria-traces
        image: victoriametrics/victoria-traces:v0.9.3
        args:
        - -storageDataPath=/vt-data
        - -retentionPeriod=7d
        ports:
        - name: http
          containerPort: 10428
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        volumeMounts:
        - name: vt-data
          mountPath: /vt-data
      volumes:
      - name: vt-data
        persistentVolumeClaim:
          claimName: victoria-traces-data
