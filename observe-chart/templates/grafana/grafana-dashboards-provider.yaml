# filename: grafana-dashboards-provider.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: default
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'Default Provider'
        orgId: 1
        folder: 'Infrastructure'
        type: file
        disableDeletion: true
        editable: true
        options:
          path: /var/lib/grafana/dashboards