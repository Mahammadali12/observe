apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: default
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        access: proxy
        url: http://victoria-metrics.default.svc.cluster.local:8428
        isDefault: true
        editable: false
      - name: VictoriaTraces
        type: jaeger
        access: proxy
        url: http://victoria-traces.default.svc.cluster.local:10428/select/jaeger
        editable: false