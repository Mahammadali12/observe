apiVersion: v1
kind: PersistentVolume
metadata:
  name: victoria-traces-pv
spec:
  capacity:
    storage: {{ .Values.victoriaTraces.pv.storage }}
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /var/lib/observability/victoria-traces
    type: DirectoryOrCreate