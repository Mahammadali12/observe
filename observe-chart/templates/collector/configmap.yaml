apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: default
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch: {}

    exporters:
      debug:
        verbosity: detailed
      otlphttp/victoriatraces:
        traces_endpoint: http://victoria-traces.default.svc.cluster.local:10428/insert/opentelemetry/v1/traces
      otlphttp/victorialogs:
        logs_endpoint: http://victoria-logs.default.svc.cluster.local:9428/insert/opentelemetry/v1/logs
      prometheus:
        endpoint: 0.0.0.0:8889

    connectors:
      span_metrics:
        histogram:
          explicit:
            buckets: [100us, 1ms, 2ms, 6ms, 10ms, 50ms, 100ms, 250ms, 500ms, 1s, 5s]
        dimensions:
          - name: http.request.method
            default: GET
          - name: http.response.status_code
        metrics_flush_interval: 15s

    service:
      telemetry:
        metrics:
          level: detailed
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug, otlphttp/victoriatraces, span_metrics]
        metrics:
          receivers: [otlp, span_metrics]
          processors: [batch]
          exporters: [debug, prometheus]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug, otlphttp/victorialogs]